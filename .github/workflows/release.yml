name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('deno.json', 'config/import_map.json') }}
          restore-keys: deno-

      - name: Lint
        run: deno lint

      - name: Unit tests
        run: deno task test

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog section for release notes
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Escape dots for regex; extract section from ## [VERSION] until next ## [
          ESCAPED="${VERSION//./\\.}"
          awk "/^## \\[${ESCAPED}\\]/,/^## \\[/" CHANGELOG.md | sed '$d' > release_notes.md
          echo "Release notes extracted (first 20 lines):"
          head -20 release_notes.md

      - name: Create release package
        run: |
          ZIP_NAME="ld-migration-scripts-${{ steps.version.outputs.VERSION }}.zip"
          git archive --format=zip --prefix=ld-migration-scripts-${{ steps.version.outputs.VERSION }}/ HEAD -o "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          ls -la "$ZIP_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          files: ${{ env.ZIP_NAME }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
